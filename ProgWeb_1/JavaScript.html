                var vElemento = document.createElement('li');

                vElemento.innerHTML = vItemLista.value;
                vLista.insertBefore(vElemento, vLista.firstChild);
            }

            function inserirItem(){
                var vLista = document.getElementById('lista');
                var vItemLista = document.getElementById('itemLista');
                var vElemento = document.createElement('li');
                vElemento.innerHTML = vItemLista.value;
                vLista.appendChild(vElemento);

            function remClasse2(){
                var vElemento = document.getElementById('div1')
                vElemento.classList.remove('classe2')
            }

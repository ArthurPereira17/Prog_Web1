<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wordle — Exercício</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #1a1a1a;
    --surface: #242424;
    --border: #3a3a3a;
    --text: #f5f5f5;
    --muted: #777;
    --green: #538d4e;
    --yellow: #b59f3b;
    --gray: #3a3a3c;
    --key-bg: #818384;
    --accent: #ffffff;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 1.5rem 1rem 2rem;
    gap: 0;
  }

  /* Header */
  header {
    width: 100%;
    max-width: 500px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding-bottom: 1.2rem;
    border-bottom: 1px solid var(--border);
    margin-bottom: 1.5rem;
  }
  header h1 { font-size: 1.8rem; font-weight: 900; letter-spacing: 0.15em; text-transform: uppercase; }
  .btn-reset {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'Space Mono', monospace;
    font-size: 0.7rem;
    padding: 0.4rem 0.8rem;
    border-radius: 6px;
    cursor: pointer;
    letter-spacing: 0.05em;
    transition: all 0.15s;
    text-transform: uppercase;
  }
  .btn-reset:hover { border-color: var(--text); color: var(--text); }

  /* Mensagem */
  #mensagem {
    min-height: 36px;
    font-family: 'Space Mono', monospace;
    font-size: 0.85rem;
    text-align: center;
    margin-bottom: 1rem;
    color: var(--text);
    transition: all 0.3s;
    letter-spacing: 0.04em;
    padding: 0 1rem;
  }
  #mensagem.vitoria { color: #6abf6a; font-weight: 700; font-size: 1rem; animation: pulse 0.5s ease; }
  #mensagem.erro { color: var(--yellow); }
  @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.05)} }

  /* Grade */
  #grade {
    display: flex;
    flex-direction: column;
    gap: 5px;
    margin-bottom: 1.5rem;
  }
  .linha {
    display: flex;
    gap: 5px;
  }
  .tile {
    width: 58px;
    height: 58px;
    border: 2px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Space Mono', monospace;
    font-size: 1.6rem;
    font-weight: 700;
    text-transform: uppercase;
    color: var(--text);
    transition: border-color 0.1s;
    user-select: none;
  }
  .tile.filled { border-color: #565758; animation: pop 0.1s ease; }
  .tile.green { background: var(--green); border-color: var(--green); color: #fff; }
  .tile.yellow { background: var(--yellow); border-color: var(--yellow); color: #fff; }
  .tile.gray { background: var(--gray); border-color: var(--gray); color: #fff; }
  @keyframes pop { 0%{transform:scale(1)} 50%{transform:scale(1.12)} 100%{transform:scale(1)} }
  .tile.flip { animation: flip 0.5s ease forwards; }
  @keyframes flip {
    0%   { transform: scaleY(1); }
    50%  { transform: scaleY(0); }
    100% { transform: scaleY(1); }
  }

  /* Teclado */
  #teclado {
    display: flex;
    flex-direction: column;
    gap: 6px;
    align-items: center;
    width: 100%;
    max-width: 500px;
  }
  .key-row { display: flex; gap: 5px; }
  .key {
    height: 56px;
    min-width: 36px;
    padding: 0 6px;
    flex: 1;
    background: var(--key-bg);
    border: none;
    border-radius: 6px;
    color: var(--text);
    font-family: 'Space Mono', monospace;
    font-weight: 700;
    font-size: 0.8rem;
    text-transform: uppercase;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .key:active { transform: scale(0.95); }
  .key.wide { min-width: 58px; font-size: 0.7rem; letter-spacing: 0.03em; }
  .key.green { background: var(--green); }
  .key.yellow { background: var(--yellow); }
  .key.gray { background: var(--gray); color: #888; }
</style>
</head>
<body>

<header>
  <h1>Wordle</h1>
  <button class="btn-reset" onclick="resetar()">↺ Reiniciar</button>
</header>

<div id="mensagem"></div>

<div id="grade"></div>
<div id="teclado"></div>

<script>
  const PALAVRA = 'CHUVA'; // Palavra secreta
  const MAX_LINHAS = 6;
  const LETRAS = 5;

  let tentativaAtual = [];
  let linhaAtual = 0;
  let jogoAtivo = true;
  let tileGrid = [];
  let estadoTeclas = {};

  const grade = document.getElementById('grade');
  const teclado = document.getElementById('teclado');
  const msg = document.getElementById('mensagem');

  const linhasTeclado = [
    ['Q','W','E','R','T','Y','U','I','O','P'],
    ['A','S','D','F','G','H','J','K','L'],
    ['ENTER','Z','X','C','V','B','N','M','⌫']
  ];

  function buildGrade() {
    grade.innerHTML = '';
    tileGrid = [];
    for (let i = 0; i < MAX_LINHAS; i++) {
      const linha = document.createElement('div');
      linha.classList.add('linha');
      const row = [];
      for (let j = 0; j < LETRAS; j++) {
        const tile = document.createElement('div');
        tile.classList.add('tile');
        linha.appendChild(tile);
        row.push(tile);
      }
      grade.appendChild(linha);
      tileGrid.push(row);
    }
  }

  function buildTeclado() {
    teclado.innerHTML = '';
    estadoTeclas = {};
    linhasTeclado.forEach(row => {
      const div = document.createElement('div');
      div.classList.add('key-row');
      row.forEach(l => {
        const btn = document.createElement('button');
        btn.classList.add('key');
        if (l === 'ENTER' || l === '⌫') btn.classList.add('wide');
        btn.textContent = l;
        btn.dataset.letra = l;
        btn.addEventListener('click', () => handleInput(l));
        div.appendChild(btn);
      });
      teclado.appendChild(div);
    });
  }

  function updateTile(row, col, letter) {
    const tile = tileGrid[row][col];
    tile.textContent = letter;
    tile.classList.toggle('filled', letter !== '');
  }

  function setMensagem(texto, tipo = '') {
    msg.textContent = texto;
    msg.className = tipo;
  }

  function handleInput(key) {
    if (!jogoAtivo) return;
    if (key === '⌫') {
      if (tentativaAtual.length > 0) {
        tentativaAtual.pop();
        updateTile(linhaAtual, tentativaAtual.length, '');
      }
    } else if (key === 'ENTER') {
      submeter();
    } else if (/^[A-ZÇ]$/.test(key) && tentativaAtual.length < LETRAS) {
      tentativaAtual.push(key);
      updateTile(linhaAtual, tentativaAtual.length - 1, key);
    }
  }

  function submeter() {
    if (tentativaAtual.length < LETRAS) {
      setMensagem('Palavra incompleta!', 'erro');
      setTimeout(() => setMensagem(''), 1500);
      return;
    }
    const tentativa = tentativaAtual.join('');
    const resultado = avaliar(tentativa);

    // Anima e colore tiles com delay
    resultado.forEach((r, i) => {
      const tile = tileGrid[linhaAtual][i];
      setTimeout(() => {
        tile.classList.add('flip');
        setTimeout(() => {
          tile.classList.remove('flip');
          tile.classList.add(r.cor);
        }, 250);
      }, i * 90);
    });

    // Atualiza teclado após animação
    setTimeout(() => {
      resultado.forEach(r => {
        const key = document.querySelector(`.key[data-letra="${r.letra}"]`);
        if (!key) return;
        const prioridade = { green: 3, yellow: 2, gray: 1 };
        const atual = prioridade[estadoTeclas[r.letra]] || 0;
        if ((prioridade[r.cor] || 0) > atual) {
          if (estadoTeclas[r.letra]) key.classList.remove(estadoTeclas[r.letra]);
          key.classList.add(r.cor);
          estadoTeclas[r.letra] = r.cor;
        }
      });
    }, LETRAS * 90 + 300);

    // Checa vitória/derrota
    setTimeout(() => {
      if (tentativa === PALAVRA) {
        jogoAtivo = false;
        setMensagem('🎉 Parabéns! Você acertou!', 'vitoria');
      } else {
        linhaAtual++;
        tentativaAtual = [];
        if (linhaAtual >= MAX_LINHAS) {
          jogoAtivo = false;
          setMensagem(`Fim de jogo! A palavra era: ${PALAVRA}`, 'erro');
        } else {
          setMensagem('');
        }
      }
    }, LETRAS * 90 + 350);
  }

  function avaliar(tentativa) {
    const resultado = Array(LETRAS).fill(null).map((_, i) => ({
      letra: tentativa[i], cor: 'gray'
    }));
    const restantes = PALAVRA.split('');
    // Primeiro pass: verdes
    for (let i = 0; i < LETRAS; i++) {
      if (tentativa[i] === PALAVRA[i]) {
        resultado[i].cor = 'green';
        restantes[i] = null;
      }
    }
    // Segundo pass: amarelos
    for (let i = 0; i < LETRAS; i++) {
      if (resultado[i].cor === 'green') continue;
      const idx = restantes.indexOf(tentativa[i]);
      if (idx !== -1) {
        resultado[i].cor = 'yellow';
        restantes[idx] = null;
      }
    }
    return resultado;
  }

  function resetar() {
    linhaAtual = 0;
    tentativaAtual = [];
    jogoAtivo = true;
    setMensagem('');
    buildGrade();
    buildTeclado();
  }

  // Teclado físico
  document.addEventListener('keydown', e => {
    if (e.key === 'Backspace') handleInput('⌫');
    else if (e.key === 'Enter') handleInput('ENTER');
    else {
      const l = e.key.toUpperCase();
      if (/^[A-ZÇ]$/.test(l)) handleInput(l);
    }
  });

  // Init
  buildGrade();
  buildTeclado();
</script>
</body>
</html>

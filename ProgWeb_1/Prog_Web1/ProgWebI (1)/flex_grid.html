<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flex e Grid</title>
    <link rel="stylesheet" href="css/exemplo.css">
    <style>
        .flex-container{
            background-color: blue;
            display: flex;
            /*flex-direction: row;* //
            /*flex-direction: row-reverse;*/
            /*flex-direction: column;*/
            /*flex-direction: column-reverse;*/
            /*Alinhamento vertical*/
            align-items: center;
            flex-wrap: wrap;
            height: 100vh;
            justify-content: space-evenly;
        }
        .flex-container > div{
            background-color: yellow;
            margin: 5px;
            text-align: center;
            padding: 5px;
            width: 100px;
            font-size: 2em;
            height: 40px;
        }
        .grid-container{
            background-color: red;
            display: grid;
            grid-template-columns: 1fr 1fr 1fr; /*auto auto auto;*/
            justify-content: center;
            gap: 5px;
            align-content: space-evenly;
            height: 100vh;
        }
        .grid-container > div{
            background-color: green;
            /*width: 50px;*/
            /*margin: 5px;*/
            text-align: center;
            font-size: 2em;

        }
        .grid-container2{
            background-color: gray;
            display: grid;
            gap: 5px;
            
        }
        .grid-container2 > div{
            background-color: lightgrey;
            text-align: center;
            font-size: 2em;
        }

        @media screen and (max-width: 600px) {
            .grid-container2 {
                grid-template-columns: 1fr;
            }
        }
        @media screen and (min-width: 601px) {
            .grid-container2 {
                grid-template-columns: 1fr 1fr;
            }
        }
    </style>
</head>
<body>
    <main>
        <div class="flex-container">
        <div>1</div>
        <div>2</div>
        <div>3</div>
        <div>4</div>
        <div>5</div>
        <div>6</div>
        <div>7</div>
        <div>8</div>
        <div>9</div>
        </div>

        <div class="grid-container">
        <div>1</div>
        <div>2</div>
        <div>3</div>
        <div>4</div>
        <div>5</div>
        <div>6</div>
        <div>7</div>
        <div>8</div>
        <div style="grid-row: span 2;">9</div>
        <div style="grid-column:span 2 ;">10</div>
        </div>

        <div class="grid-container2">
        <div>1</div>
        <div>2</div>
        <div>3</div>
        <div>4</div>
        <div>5</div>
        <div>6</div>
        <div>7</div>
        <div>8</div>
        <div>9</div>
        <div>10</div>
        </div>

        <p>
            <button class="botao_default">Clique aqui</button>
        </p>
    </main>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página 2</title>
        <link rel="shortcut icon" href="img/logoFurb.jpg" type="image/pmg">
        <link rel="stylesheet" href="css/style.css">
        <style>
            body{
                background-color: coral;
            }
        </style>
</head>
<body>
    <h4>Essa é a Página 2</h4>
    <a href="index.html">Voltar para Página Inicial</a>
    <a href="index.html#Link_Google" id="Ultimo_item">Página Inicial</a>
    <a href="pagina3.html" class="estilo">Acesse a Página 3</a>
    <br>

    <form action="#" method="get">
        <label for="login">Login: </label>
        <input type="text" name="login" 
        id="login" required autofocus maxlength="20">
        <br>
        <label for="password">Senha: </label>
        <input type="password" name="password" 
        id="password" placeholder="Informe a Senha" 
        required autofocus maxlength="20">
        <br>
        <input type="text" name="endereco"
        placeholder="Informe o seu endereço" size="80">
        <br>
        <label for="cpf">CPF: </label>
        <input type="text" name="cpf" id="cpf"
        maxlength="14" pattern="\d{3}\.\d{3}\.\d{3}-\d{2}">
        <br>
        <label for="pais">País: </label>
        <input type="text" name="pais" id="pais" size="4" 
        maxlength="4" pattern="[A-Za-z]{3}" title="Codigo do País">
        <br>
        <label for="idade">Idade: </label>
        <input type="number" name="idade" id="idade" 
        min="15" max="110">
        <br>
        <input type="text" name="campo1" 
        value="valor1" readonly>
        <br>
        <input type="text" name="campo2"
        value="valor2" disabled>
        <br>
        <input type="hidden" name="campo3" 
        value="valor3">
        <br>
        <input type="date" name="data1">
        <input type="time" name="hora1" id="">
        <input type="datetime-local" name="datahora" id="">
        <input type="month" name="mes" id="">
        <input type="week" name="semana1" id="">
        <br>
        <label for="check">Lembrar Usuario: </label>
        <input type="checkbox" name="check" value="S" checked>
        <br>
        <label for="cidade1">Blumenau: </label>
        <input type="radio" name="cidade" id="cidade1">
        <label for="cidade2">Gaspar: </label>
        <input type="radio" name="cidade" id="cidade2">
        <label for="cidade3">Indaial: </label>
        <input type="radio" name="cidade" id="cidade3">
        <br>
        <select name="estado" id="estado">
            <option value="PR">Paraná</option>
            <option value="SC">Santa Catarina</option>
            <option value="RS">Rio Grande do Sul</option>
        </select>
        <p>
            <input type="submit" value="Enviar">
            <input type="reset" value="Limpar">
        </p>
        <br>

        <p>
            <input type="button" value="Clique Aqui"
            onclick="alert('Niggers')">
            <input type="color" name="cor" id="">
            <input type="email" name="email" placeholder="E-mail">
            <input type="url" name="Url" placeholder="Url da Página">
            <input type="range" name="range" min="5" max="670">
            <input type="file" name="Arquivo" id="Arquivo">
        </p>

        <label for="Arquivo">Selcione um Arquivo</label>
        
        <br>

        
    </form>
    
    <br>

    <img src="img/images2.jpg" width="400px" alt="">
</body>
</html>
